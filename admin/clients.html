<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients — Admin</title>
  <link rel="stylesheet" href="../shared/admin.css">
  <style>
    :root {
      --wine: #6b2d3e; --gold: #c9a84c; --cream: #f5f0e8;
      --sage: #5a6b5d; --dark: #1a1a1a; --surface: #ffffff;
      --border: #e5e0d8; --text: #2d2520; --muted: #8a8078;
    }
    body { margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--text); }
    .admin-layout { display:grid; grid-template-columns:220px 1fr; min-height:100vh; }

    .sidebar {
      background:var(--wine); color:#fff; padding:24px 0;
      position:sticky; top:0; height:100vh; overflow-y:auto;
    }
    .sidebar__brand { padding:0 20px 24px; border-bottom:1px solid rgba(255,255,255,.15); }
    .sidebar__brand-name { font-size:13px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:#fff; }
    .sidebar__brand-sub  { font-size:11px; color:rgba(255,255,255,.5); margin-top:2px; }
    .sidebar__nav { padding:16px 0; }
    .sidebar__nav a {
      display:block; padding:10px 20px; color:rgba(255,255,255,.75); text-decoration:none;
      font-size:13px; font-weight:500; transition:all .15s;
    }
    .sidebar__nav a:hover { background:rgba(255,255,255,.1); color:#fff; }
    .sidebar__nav a.active { background:rgba(255,255,255,.15); color:#fff; border-left:3px solid var(--gold); padding-left:17px; }
    .sidebar__user { padding:16px 20px; border-top:1px solid rgba(255,255,255,.15); }
    .sidebar__user-name { font-size:12px; font-weight:600; color:#fff; }
    .sidebar__user-email { font-size:11px; color:rgba(255,255,255,.5); }
    .sidebar__signout { display:block; margin-top:10px; font-size:12px; color:rgba(255,255,255,.5); cursor:pointer; text-decoration:underline; }

    .main { padding:32px; overflow-y:auto; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .page-header h1 { font-size:24px; font-weight:700; margin:0; }

    .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
    .search-input {
      flex:1; min-width:200px; padding:9px 14px; border:1px solid var(--border); border-radius:8px;
      font-size:14px; background:#fff; color:var(--text); outline:none; transition:.15s;
    }
    .search-input:focus { border-color:var(--wine); }
    .filter-select {
      padding:9px 12px; border:1px solid var(--border); border-radius:8px;
      font-size:13px; background:#fff; color:var(--text); cursor:pointer;
    }

    .btn { padding:9px 18px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:.15s; }
    .btn-primary { background:var(--wine); color:#fff; }
    .btn-primary:hover { opacity:.9; }
    .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--cream); }
    .btn-danger { background:#dc2626; color:#fff; }
    .btn-sm { padding:5px 12px; font-size:12px; }

    .client-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:14px; }
    .client-card {
      background:#fff; border:1px solid var(--border); border-radius:12px;
      padding:20px; cursor:pointer; transition:.15s;
    }
    .client-card:hover { border-color:var(--wine); box-shadow:0 4px 16px rgba(107,45,62,.08); }
    .client-card__header { display:flex; align-items:center; gap:14px; margin-bottom:12px; }
    .client-card__avatar {
      width:44px; height:44px; border-radius:50%; background:var(--wine); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:700; flex-shrink:0;
    }
    .client-card__name { font-size:15px; font-weight:700; margin-bottom:2px; }
    .client-card__email { font-size:12px; color:var(--muted); }
    .client-card__meta { font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:4px; }
    .client-card__tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
    .tag {
      display:inline-block; padding:2px 8px; border-radius:12px;
      font-size:11px; font-weight:600; background:rgba(107,45,62,.08); color:var(--wine);
    }
    .client-count { font-size:14px; color:var(--muted); }

    /* Modal */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100;
      display:flex; align-items:center; justify-content:center; padding:20px;
      opacity:0; pointer-events:none; transition:.2s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background:#fff; border-radius:16px; width:100%; max-width:600px;
      max-height:90vh; overflow-y:auto; padding:28px;
      transform:translateY(12px); transition:.2s;
      box-shadow:0 20px 60px rgba(0,0,0,.18);
    }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .modal-header h2 { font-size:18px; font-weight:700; margin:0; }
    .modal-close { border:none; background:none; font-size:20px; cursor:pointer; color:var(--muted); padding:4px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:7px;
      font-size:14px; color:var(--text); background:#fff; box-sizing:border-box;
      transition:.15s; font-family:inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline:none; border-color:var(--wine); box-shadow:0 0 0 3px rgba(107,45,62,.08);
    }
    .form-group textarea { resize:vertical; min-height:80px; }
    .modal-footer { display:flex; justify-content:space-between; align-items:center; margin-top:24px; padding-top:16px; border-top:1px solid var(--border); }

    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .toast {
      position:fixed; bottom:24px; right:24px; z-index:9999;
      background:#1a1a1a; color:#fff; padding:12px 20px; border-radius:8px;
      font-size:13px; font-weight:500; transform:translateY(80px); opacity:0;
      transition:.3s; max-width:320px; box-shadow:0 4px 16px rgba(0,0,0,.2);
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { background:var(--sage); }
    .toast.error   { background:#dc2626; }

    /* Detail panel */
    .detail-panel {
      position:fixed; top:0; right:0; bottom:0; width:420px; background:#fff;
      border-left:1px solid var(--border); z-index:200; overflow-y:auto;
      transform:translateX(100%); transition:.25s; box-shadow:-4px 0 24px rgba(0,0,0,.1);
    }
    .detail-panel.open { transform:translateX(0); }
    .detail-panel__header { padding:24px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .detail-panel__header h2 { font-size:16px; font-weight:700; margin:0; }
    .detail-panel__body { padding:24px; }
    .detail-section { margin-bottom:24px; }
    .detail-section h3 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 12px; }
    .detail-row { display:flex; gap:8px; font-size:14px; margin-bottom:8px; }
    .detail-label { color:var(--muted); min-width:100px; flex-shrink:0; }
    .detail-value { color:var(--text); }
    .mini-appt { padding:8px 10px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; font-size:13px; }
    .mini-appt__title { font-weight:600; }
    .mini-appt__sub { color:var(--muted); font-size:11px; margin-top:2px; }
    .detail-actions { display:flex; gap:8px; padding:16px 24px; border-top:1px solid var(--border); }

    @media(max-width:900px) {
      .admin-layout { grid-template-columns:1fr; }
      .sidebar { display:none; }
      .main { padding:16px; }
      .form-row { grid-template-columns:1fr; }
      .detail-panel { width:100%; }
    }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__brand-name">Animist Apothecary</div>
      <div class="sidebar__brand-sub">Admin</div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html">Dashboard</a>
      <a href="clients.html" class="active">Clients</a>
      <a href="appointments.html">Appointments</a>
      <a href="services.html">Services</a>
      <a href="mentorship.html">Mentorship</a>
      <a href="payments.html">Payments</a>
      <a href="intake-forms.html">Intake Forms</a>
    </nav>
    <div class="sidebar__user">
      <div class="sidebar__user-name" id="userName">—</div>
      <div class="sidebar__user-email" id="userEmail">—</div>
      <a class="sidebar__signout" id="signOutBtn">Sign out</a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <h1>Clients</h1>
        <div class="client-count" id="clientCount"></div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ New Client</button>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by name, email, or tag…" oninput="filterClients()">
      <select class="filter-select" id="tagFilter" onchange="filterClients()">
        <option value="">All tags</option>
      </select>
    </div>

    <div class="client-grid" id="clientGrid"></div>
  </main>
</div>

<!-- Edit/Create Modal -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New Client</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="fName" placeholder="Full name" required>
      </div>
      <div class="form-group">
        <label>Pronouns</label>
        <input type="text" id="fPronouns" placeholder="she/her, they/them…">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="fEmail" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="fPhone" placeholder="+1 (555) 000-0000">
      </div>
    </div>
    <div class="form-group">
      <label>Emergency Contact</label>
      <input type="text" id="fEmergency" placeholder="Name — relationship — phone">
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input type="text" id="fTags" placeholder="somatic, mentorship, ceremony…">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Intake summary, intentions, session history…"></textarea>
    </div>
    <div class="modal-footer">
      <div>
        <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteClient()" style="display:none">Archive</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveClient()" id="saveBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-panel__header">
    <h2 id="detailName">—</h2>
    <button class="modal-close" onclick="closeDetail()">×</button>
  </div>
  <div class="detail-panel__body" id="detailBody"></div>
  <div class="detail-actions">
    <button class="btn btn-ghost btn-sm" onclick="editFromDetail()">Edit</button>
    <button class="btn btn-primary btn-sm" onclick="newApptForClient()">+ Appointment</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script>
let allClients = [];
let editingId = null;
let detailClientId = null;

requireAuth(async function(user, sb) {
  document.getElementById('userName').textContent = user.user_metadata?.full_name || user.email.split('@')[0];
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '../login.html';
  });
  await loadClients();
});

async function loadClients() {
  const { data, error } = await window.adminSupabase
    .from('clients').select('*').eq('is_archived', false).order('full_name');
  if (error) { showToast('Failed to load clients', 'error'); return; }
  allClients = data || [];
  buildTagFilter();
  filterClients();
  document.getElementById('clientCount').textContent = allClients.length + ' client' + (allClients.length !== 1 ? 's' : '');
}

function buildTagFilter() {
  const all = new Set();
  allClients.forEach(c => (c.tags || []).forEach(t => all.add(t)));
  const sel = document.getElementById('tagFilter');
  const current = sel.value;
  sel.innerHTML = '<option value="">All tags</option>';
  [...all].sort().forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    if (t === current) o.selected = true;
    sel.appendChild(o);
  });
}

function filterClients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const tag = document.getElementById('tagFilter').value;
  const filtered = allClients.filter(c => {
    const matchQ = !q ||
      c.full_name?.toLowerCase().includes(q) ||
      c.email?.toLowerCase().includes(q) ||
      (c.tags || []).some(t => t.toLowerCase().includes(q));
    const matchTag = !tag || (c.tags || []).includes(tag);
    return matchQ && matchTag;
  });
  renderClients(filtered);
}

function renderClients(list) {
  const grid = document.getElementById('clientGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><p>No clients found.</p></div>';
    return;
  }
  grid.innerHTML = list.map(c => {
    const initials = c.full_name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const tags = (c.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    return `<div class="client-card" onclick="openDetail('${c.id}')">
      <div class="client-card__header">
        <div class="client-card__avatar">${initials}</div>
        <div>
          <div class="client-card__name">${esc(c.full_name)}</div>
          <div class="client-card__email">${esc(c.email || '')}</div>
        </div>
      </div>
      <div class="client-card__meta">
        ${c.phone ? `<span>📞 ${esc(c.phone)}</span>` : ''}
        ${c.pronouns ? `<span>${esc(c.pronouns)}</span>` : ''}
      </div>
      ${tags ? `<div class="client-card__tags">${tags}</div>` : ''}
    </div>`;
  }).join('');
}

async function openDetail(id) {
  detailClientId = id;
  const c = allClients.find(x => x.id === id);
  if (!c) return;

  document.getElementById('detailName').textContent = c.full_name;

  // Load recent appointments
  const { data: appts } = await window.adminSupabase
    .from('appointments')
    .select('id, scheduled_at, status, services(name)')
    .eq('client_id', id)
    .eq('is_archived', false)
    .order('scheduled_at', { ascending: false })
    .limit(5);

  const apptHtml = (appts || []).length
    ? (appts || []).map(a => {
        const d = new Date(a.scheduled_at);
        const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
        return `<div class="mini-appt">
          <div class="mini-appt__title">${esc(a.services?.name || 'Session')}</div>
          <div class="mini-appt__sub">${dateStr} · ${a.status}</div>
        </div>`;
      }).join('')
    : '<p style="font-size:13px;color:var(--muted);margin:0">No appointments yet.</p>';

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">
      <h3>Contact</h3>
      ${c.email ? `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${esc(c.email)}</span></div>` : ''}
      ${c.phone ? `<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${esc(c.phone)}</span></div>` : ''}
      ${c.pronouns ? `<div class="detail-row"><span class="detail-label">Pronouns</span><span class="detail-value">${esc(c.pronouns)}</span></div>` : ''}
      ${c.emergency_contact ? `<div class="detail-row"><span class="detail-label">Emergency</span><span class="detail-value">${esc(c.emergency_contact)}</span></div>` : ''}
    </div>
    ${(c.tags||[]).length ? `<div class="detail-section">
      <h3>Tags</h3>
      <div class="client-card__tags">${(c.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${c.notes ? `<div class="detail-section">
      <h3>Notes</h3>
      <p style="font-size:13px;line-height:1.6;margin:0;white-space:pre-wrap">${esc(c.notes)}</p>
    </div>` : ''}
    <div class="detail-section">
      <h3>Recent Appointments</h3>
      ${apptHtml}
    </div>`;

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  detailClientId = null;
}

function editFromDetail() {
  if (detailClientId) {
    closeDetail();
    openModal(detailClientId);
  }
}

function newApptForClient() {
  window.location.href = 'appointments.html';
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Client' : 'New Client';
  document.getElementById('deleteBtn').style.display = id ? '' : 'none';

  if (id) {
    const c = allClients.find(x => x.id === id);
    if (c) {
      document.getElementById('fName').value = c.full_name || '';
      document.getElementById('fPronouns').value = c.pronouns || '';
      document.getElementById('fEmail').value = c.email || '';
      document.getElementById('fPhone').value = c.phone || '';
      document.getElementById('fEmergency').value = c.emergency_contact || '';
      document.getElementById('fTags').value = (c.tags || []).join(', ');
      document.getElementById('fNotes').value = c.notes || '';
    }
  } else {
    ['fName','fPronouns','fEmail','fPhone','fEmergency','fTags','fNotes'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }
  document.getElementById('clientModal').classList.add('open');
}

function closeModal() {
  document.getElementById('clientModal').classList.remove('open');
}

async function saveClient() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('Full name is required', 'error'); btn.textContent='Save'; btn.disabled=false; return; }

  const tagsRaw = document.getElementById('fTags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  const payload = {
    full_name: name,
    pronouns: document.getElementById('fPronouns').value.trim() || null,
    email: document.getElementById('fEmail').value.trim() || null,
    phone: document.getElementById('fPhone').value.trim() || null,
    emergency_contact: document.getElementById('fEmergency').value.trim() || null,
    tags: tags.length ? tags : null,
    notes: document.getElementById('fNotes').value.trim() || null,
    updated_at: new Date().toISOString(),
  };

  if (editingId) {
    const { error } = await window.adminSupabase.from('clients').update(payload).eq('id', editingId);
    if (error) { showToast('Save failed: ' + error.message, 'error'); btn.textContent='Save'; btn.disabled=false; return; }
    showToast('Client updated', 'success');
  } else {
    const { error } = await window.adminSupabase.from('clients').insert(payload);
    if (error) { showToast('Save failed: ' + error.message, 'error'); btn.textContent='Save'; btn.disabled=false; return; }
    showToast('Client created', 'success');
  }

  closeModal();
  await loadClients();
  btn.textContent = 'Save'; btn.disabled = false;
}

async function deleteClient() {
  if (!editingId) return;
  if (!confirm('Archive this client? They will be hidden but their records will be preserved.')) return;
  const { error } = await window.adminSupabase.from('clients').update({ is_archived: true }).eq('id', editingId);
  if (error) { showToast('Archive failed', 'error'); return; }
  closeModal();
  await loadClients();
  showToast('Client archived');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show${type ? ' '+type : ''}`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

document.getElementById('clientModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
