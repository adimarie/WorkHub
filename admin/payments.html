<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments — Admin</title>
  <link rel="stylesheet" href="../shared/admin.css">
  <style>
    :root {
      --wine: #6b2d3e; --gold: #c9a84c; --cream: #f5f0e8;
      --sage: #5a6b5d; --surface: #ffffff; --border: #e5e0d8; --text: #2d2520; --muted: #8a8078;
    }
    body { margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--text); }
    .admin-layout { display:grid; grid-template-columns:220px 1fr; min-height:100vh; }

    .sidebar { background:var(--wine); color:#fff; padding:24px 0; position:sticky; top:0; height:100vh; overflow-y:auto; }
    .sidebar__brand { padding:0 20px 24px; border-bottom:1px solid rgba(255,255,255,.15); }
    .sidebar__brand-name { font-size:13px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:#fff; }
    .sidebar__brand-sub  { font-size:11px; color:rgba(255,255,255,.5); margin-top:2px; }
    .sidebar__nav { padding:16px 0; }
    .sidebar__nav a { display:block; padding:10px 20px; color:rgba(255,255,255,.75); text-decoration:none; font-size:13px; font-weight:500; transition:all .15s; }
    .sidebar__nav a:hover { background:rgba(255,255,255,.1); color:#fff; }
    .sidebar__nav a.active { background:rgba(255,255,255,.15); color:#fff; border-left:3px solid var(--gold); padding-left:17px; }
    .sidebar__user { padding:16px 20px; border-top:1px solid rgba(255,255,255,.15); }
    .sidebar__user-name { font-size:12px; font-weight:600; color:#fff; }
    .sidebar__user-email { font-size:11px; color:rgba(255,255,255,.5); }
    .sidebar__signout { display:block; margin-top:10px; font-size:12px; color:rgba(255,255,255,.5); cursor:pointer; text-decoration:underline; }

    .main { padding:32px; overflow-y:auto; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .page-header h1 { font-size:24px; font-weight:700; margin:0; }

    .summary-cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:12px; margin-bottom:24px; }
    .summary-card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px 20px; }
    .summary-card__label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:6px; }
    .summary-card__value { font-size:22px; font-weight:700; color:var(--text); }
    .summary-card__sub { font-size:12px; color:var(--muted); margin-top:2px; }

    .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
    .search-input { flex:1; min-width:200px; padding:9px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fff; color:var(--text); outline:none; transition:.15s; }
    .search-input:focus { border-color:var(--wine); }
    .filter-select { padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; background:#fff; color:var(--text); cursor:pointer; }

    .btn { padding:9px 18px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:.15s; }
    .btn-primary { background:var(--wine); color:#fff; }
    .btn-primary:hover { opacity:.9; }
    .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--cream); }
    .btn-danger { background:#dc2626; color:#fff; }
    .btn-sm { padding:5px 12px; font-size:12px; }

    .payment-table { background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .payment-table table { width:100%; border-collapse:collapse; }
    .payment-table th { padding:12px 16px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); border-bottom:1px solid var(--border); background:#fafaf8; }
    .payment-table td { padding:14px 16px; font-size:13px; border-bottom:1px solid #f5f0e8; vertical-align:middle; }
    .payment-table tr:last-child td { border-bottom:none; }
    .payment-table tr:hover td { background:#fdf9f3; cursor:pointer; }

    .status-badge { display:inline-block; padding:3px 8px; border-radius:12px; font-size:11px; font-weight:600; }
    .status-completed { background:#dcfce7; color:#15803d; }
    .status-pending { background:#fef9c3; color:#854d0e; }
    .status-failed { background:#fee2e2; color:#b91c1c; }
    .status-refunded { background:#e0f2fe; color:#0369a1; }

    .method-badge { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); }
    .amount-cell { font-weight:700; font-size:14px; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100;
      display:flex; align-items:center; justify-content:center; padding:20px;
      opacity:0; pointer-events:none; transition:.2s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background:#fff; border-radius:16px; width:100%; max-width:520px;
      max-height:90vh; overflow-y:auto; padding:28px;
      transform:translateY(12px); transition:.2s;
      box-shadow:0 20px 60px rgba(0,0,0,.18);
    }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .modal-header h2 { font-size:18px; font-weight:700; margin:0; }
    .modal-close { border:none; background:none; font-size:20px; cursor:pointer; color:var(--muted); padding:4px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:7px;
      font-size:14px; color:var(--text); background:#fff; box-sizing:border-box; transition:.15s; font-family:inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline:none; border-color:var(--wine); box-shadow:0 0 0 3px rgba(107,45,62,.08);
    }
    .modal-footer { display:flex; justify-content:space-between; align-items:center; margin-top:24px; padding-top:16px; border-top:1px solid var(--border); }

    .toast { position:fixed; bottom:24px; right:24px; z-index:9999; background:#1a1a1a; color:#fff; padding:12px 20px; border-radius:8px; font-size:13px; font-weight:500; transform:translateY(80px); opacity:0; transition:.3s; max-width:320px; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { background:var(--sage); }
    .toast.error   { background:#dc2626; }
    .empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }

    @media(max-width:900px) {
      .admin-layout { grid-template-columns:1fr; }
      .sidebar { display:none; }
      .main { padding:16px; }
      .form-row { grid-template-columns:1fr; }
      .payment-table { overflow-x:auto; }
    }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__brand-name">Animist Apothecary</div>
      <div class="sidebar__brand-sub">Admin</div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="appointments.html">Appointments</a>
      <a href="services.html">Services</a>
      <a href="mentorship.html">Mentorship</a>
      <a href="payments.html" class="active">Payments</a>
      <a href="intake-forms.html">Intake Forms</a>
    </nav>
    <div class="sidebar__user">
      <div class="sidebar__user-name" id="userName">—</div>
      <div class="sidebar__user-email" id="userEmail">—</div>
      <a class="sidebar__signout" id="signOutBtn">Sign out</a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>Payments</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Record Payment</button>
    </div>

    <div class="summary-cards" id="summaryCards">
      <div class="summary-card">
        <div class="summary-card__label">Total Received</div>
        <div class="summary-card__value" id="sumTotal">—</div>
        <div class="summary-card__sub">All time</div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">This Month</div>
        <div class="summary-card__value" id="sumMonth">—</div>
        <div class="summary-card__sub" id="sumMonthLabel">—</div>
      </div>
      <div class="summary-card">
        <div class="summary-card__label">Pending</div>
        <div class="summary-card__value" id="sumPending">—</div>
        <div class="summary-card__sub">Awaiting payment</div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by client or notes…" oninput="filterPayments()">
      <select class="filter-select" id="statusFilter" onchange="filterPayments()">
        <option value="">All statuses</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
        <option value="failed">Failed</option>
        <option value="refunded">Refunded</option>
      </select>
      <select class="filter-select" id="methodFilter" onchange="filterPayments()">
        <option value="">All methods</option>
        <option value="cash">Cash</option>
        <option value="venmo">Venmo</option>
        <option value="zelle">Zelle</option>
        <option value="trade">Trade</option>
        <option value="square">Square</option>
        <option value="stripe">Stripe</option>
      </select>
    </div>

    <div class="payment-table">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Client</th>
            <th>Amount</th>
            <th>Method</th>
            <th>Status</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="paymentBody"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="paymentModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Record Payment</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Client *</label>
        <select id="fClient"><option value="">Select client…</option></select>
      </div>
      <div class="form-group">
        <label>Amount ($) *</label>
        <input type="number" id="fAmount" placeholder="175" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Payment Method</label>
        <select id="fMethod">
          <option value="cash">Cash</option>
          <option value="venmo">Venmo</option>
          <option value="zelle">Zelle</option>
          <option value="trade">Trade / Barter</option>
          <option value="square">Square</option>
          <option value="stripe">Stripe</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
          <option value="failed">Failed</option>
          <option value="refunded">Refunded</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <input type="text" id="fNotes" placeholder="Session, container reference, etc.">
    </div>
    <div class="modal-footer">
      <div>
        <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deletePayment()" style="display:none">Delete</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="savePayment()" id="saveBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script>
let allPayments = [];
let clients = [];
let editingId = null;

requireAuth(async function(user, sb) {
  document.getElementById('userName').textContent = user.user_metadata?.full_name || user.email.split('@')[0];
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await sb.auth.signOut(); window.location.href = '../login.html';
  });
  await Promise.all([loadClients(), loadPayments()]);
});

async function loadClients() {
  const { data } = await window.adminSupabase.from('clients').select('id, full_name').eq('is_archived', false).order('full_name');
  clients = data || [];
  const sel = document.getElementById('fClient');
  sel.innerHTML = '<option value="">Select client…</option>';
  clients.forEach(c => sel.innerHTML += `<option value="${c.id}">${esc(c.full_name)}</option>`);
}

async function loadPayments() {
  const { data, error } = await window.adminSupabase
    .from('payments')
    .select('*, clients(id, full_name)')
    .eq('is_archived', false)
    .order('created_at', { ascending: false });
  if (error) { showToast('Failed to load payments', 'error'); return; }
  allPayments = data || [];
  updateSummary();
  filterPayments();
}

function updateSummary() {
  const completed = allPayments.filter(p => p.status === 'completed');
  const pending = allPayments.filter(p => p.status === 'pending');
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonth = completed.filter(p => new Date(p.created_at) >= monthStart);

  const fmt = cents => '$' + (cents / 100).toLocaleString('en-US', {minimumFractionDigits:0});
  document.getElementById('sumTotal').textContent = fmt(completed.reduce((a,p) => a + (p.amount_cents||0), 0));
  document.getElementById('sumMonth').textContent = fmt(thisMonth.reduce((a,p) => a + (p.amount_cents||0), 0));
  document.getElementById('sumMonthLabel').textContent = now.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  document.getElementById('sumPending').textContent = fmt(pending.reduce((a,p) => a + (p.amount_cents||0), 0));
}

function filterPayments() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const method = document.getElementById('methodFilter').value;

  const filtered = allPayments.filter(p => {
    const matchQ = !q || p.clients?.full_name?.toLowerCase().includes(q) || p.notes?.toLowerCase().includes(q);
    const matchS = !status || p.status === status;
    const matchM = !method || p.payment_method === method;
    return matchQ && matchS && matchM;
  });
  renderPayments(filtered);
}

function renderPayments(list) {
  const tbody = document.getElementById('paymentBody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty">No payments found.</div></td></tr>';
    return;
  }
  tbody.innerHTML = list.map(p => {
    const date = new Date(p.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    const amount = p.amount_cents != null ? '$' + (p.amount_cents / 100).toLocaleString('en-US', {minimumFractionDigits:0}) : '—';
    return `<tr onclick="openModal('${p.id}')">
      <td>${date}</td>
      <td>${esc(p.clients?.full_name || '—')}</td>
      <td class="amount-cell">${amount}</td>
      <td><span class="method-badge">${esc(p.payment_method || '—')}</span></td>
      <td><span class="status-badge status-${p.status||'pending'}">${p.status||'pending'}</span></td>
      <td style="color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.notes||'')}</td>
    </tr>`;
  }).join('');
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Payment' : 'Record Payment';
  document.getElementById('deleteBtn').style.display = id ? '' : 'none';

  if (id) {
    const p = allPayments.find(x => x.id === id);
    if (p) {
      document.getElementById('fClient').value = p.client_id || '';
      document.getElementById('fAmount').value = p.amount_cents != null ? (p.amount_cents / 100) : '';
      document.getElementById('fMethod').value = p.payment_method || 'cash';
      document.getElementById('fStatus').value = p.status || 'completed';
      document.getElementById('fNotes').value = p.notes || '';
    }
  } else {
    document.getElementById('fClient').value = '';
    document.getElementById('fAmount').value = '';
    document.getElementById('fMethod').value = 'cash';
    document.getElementById('fStatus').value = 'completed';
    document.getElementById('fNotes').value = '';
  }
  document.getElementById('paymentModal').classList.add('open');
}

function closeModal() {
  document.getElementById('paymentModal').classList.remove('open');
}

async function savePayment() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  const clientId = document.getElementById('fClient').value;
  const amountVal = document.getElementById('fAmount').value;
  if (!clientId || !amountVal) { showToast('Client and amount are required', 'error'); btn.textContent='Save'; btn.disabled=false; return; }

  const payload = {
    client_id: clientId,
    amount_cents: Math.round(parseFloat(amountVal) * 100),
    payment_method: document.getElementById('fMethod').value,
    status: document.getElementById('fStatus').value,
    notes: document.getElementById('fNotes').value.trim() || null,
  };

  if (editingId) {
    const { error } = await window.adminSupabase.from('payments').update(payload).eq('id', editingId);
    if (error) { showToast('Save failed: ' + error.message, 'error'); btn.textContent='Save'; btn.disabled=false; return; }
    showToast('Payment updated', 'success');
  } else {
    const { error } = await window.adminSupabase.from('payments').insert(payload);
    if (error) { showToast('Save failed: ' + error.message, 'error'); btn.textContent='Save'; btn.disabled=false; return; }
    showToast('Payment recorded', 'success');
  }
  closeModal();
  await loadPayments();
  btn.textContent = 'Save'; btn.disabled = false;
}

async function deletePayment() {
  if (!editingId) return;
  if (!confirm('Delete this payment record?')) return;
  const { error } = await window.adminSupabase.from('payments').update({ is_archived: true }).eq('id', editingId);
  if (error) { showToast('Delete failed', 'error'); return; }
  closeModal();
  await loadPayments();
  showToast('Payment deleted');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show${type ? ' '+type : ''}`;
  setTimeout(() => t.classList.remove('show'), 3500);
}
document.getElementById('paymentModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
