<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — The Animist Apothecary</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Georgia, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f0e8;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 32px rgba(44,31,16,.10);
            text-align: center;
        }
        .mark { font-size: 40px; margin-bottom: 16px; }
        h1 { font-size: 22px; color: #2e1f10; font-weight: 600; margin-bottom: 6px; }
        .sub { font-size: 14px; color: #8a7668; margin-bottom: 32px; line-height: 1.5; }

        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px;
            background: #fff; border: 2px solid #e0cfbb;
            border-radius: 8px; cursor: pointer;
            font-family: Georgia, serif; font-size: 15px; color: #2e1f10;
            transition: all .15s; margin-bottom: 20px;
        }
        .google-btn:hover { background: #fdf9f3; border-color: #c9b49a; }
        .google-btn:disabled { opacity: .5; cursor: not-allowed; }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; color: #c9b49a; font-size: 12px;
        }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e0cfbb; }

        .field { margin-bottom: 14px; text-align: left; }
        .field label { display: block; font-size: 11px; font-family: 'Courier New', monospace;
            letter-spacing: .06em; color: #7a5535; margin-bottom: 5px; }
        .field input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #e0cfbb; border-radius: 7px;
            font-size: 15px; font-family: Georgia, serif; color: #2e1f10;
            background: #fdf9f3; outline: none; transition: border-color .15s;
        }
        .field input:focus { border-color: #b85c35; }

        .submit-btn {
            width: 100%; padding: 12px;
            background: #b85c35; color: #fff8f2;
            border: none; border-radius: 8px; cursor: pointer;
            font-family: Georgia, serif; font-size: 15px;
            transition: opacity .15s; margin-top: 4px;
        }
        .submit-btn:hover { opacity: .88; }
        .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

        .error {
            background: #fef2f2; border: 1px solid #fca5a5;
            border-radius: 7px; padding: 10px 14px;
            font-size: 13px; color: #991b1b;
            margin-bottom: 16px; text-align: left; display: none;
        }
        .error.show { display: block; }

        .back { display: block; margin-top: 24px; font-size: 12px; color: #c9b49a; text-decoration: none; }
        .back:hover { color: #7a5535; }

        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="mark">🌿</div>
    <h1>The Animist Apothecary</h1>
    <p class="sub">Practitioner portal — sign in to access your practice dashboard.</p>

    <div class="error" id="errorBox"></div>

    <button class="google-btn" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
    </button>

    <div class="divider">or</div>

    <form id="emailForm">
        <div class="field">
            <label>EMAIL</label>
            <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
            <label>PASSWORD</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="Password" required>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
    </form>

    <a href="index.html" class="back">← Back to site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function() {
    var SUPABASE_URL = 'https://wdecjlrfulsdklqeetqb.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkZWNqbHJmdWxzZGtscWVldHFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODQwMTQsImV4cCI6MjA4ODY2MDAxNH0.mIBgkpU24IgxnzS8kR06FOL6_1Z9NmaEDe9z36CxtHs';
    var DEST = 'admin/index.html';

    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { detectSessionInUrl: true, persistSession: true }
    });

    function showError(msg) {
        var el = document.getElementById('errorBox');
        el.textContent = msg;
        el.classList.add('show');
    }
    function clearError() {
        document.getElementById('errorBox').classList.remove('show');
    }

    // If already signed in, go straight through
    sb.auth.getSession().then(function(r) {
        if (r.data && r.data.session) {
            window.location.href = DEST;
        }
    });

    // ── Google ────────────────────────────────────────────────────────────────
    document.getElementById('googleBtn').addEventListener('click', function() {
        clearError();
        var btn = document.getElementById('googleBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Connecting…';

        // Build the callback URL dynamically from the current origin + path
        var base = window.location.href.replace(/\/[^\/]*$/, '/');
        var callbackUrl = base + 'auth/callback.html';

        sb.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: callbackUrl
            }
        }).then(function(result) {
            if (result.error) {
                showError('Google sign-in failed: ' + result.error.message);
                btn.disabled = false;
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google';
            }
            // If no error, Supabase is redirecting — button stays disabled
        }).catch(function(err) {
            showError('Unexpected error: ' + (err.message || err));
            btn.disabled = false;
        });
    });

    // ── Email / Password ──────────────────────────────────────────────────────
    document.getElementById('emailForm').addEventListener('submit', function(e) {
        e.preventDefault();
        clearError();

        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var btn = document.getElementById('submitBtn');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';

        sb.auth.signInWithPassword({ email: email, password: password })
            .then(function(result) {
                if (result.error) {
                    showError(result.error.message || 'Invalid email or password.');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                } else {
                    window.location.href = DEST;
                }
            })
            .catch(function(err) {
                showError('Unexpected error: ' + (err.message || err));
                btn.disabled = false;
                btn.textContent = 'Sign In';
            });
    });
})();
</script>
</body>
</html>
