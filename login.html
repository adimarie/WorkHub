<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Workhub</title>
    <link rel="stylesheet" href="shared/admin.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; background: var(--aap-bg); }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-card__mark">🌿</div>
        <h1 class="login-card__title">Workhub</h1>
        <p class="login-card__subtitle">Practitioner portal — sign in to access your practice dashboard.</p>

        <button class="login-card__google" id="googleBtn" type="button">
            <svg width="20" height="20" viewBox="0 0 48 48" style="flex-shrink:0">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
        </button>

        <div class="login-card__divider"><span>or sign in with email</span></div>

        <form id="emailForm">
            <div class="login-card__field">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
            </div>
            <div class="login-card__field">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="Password">
            </div>
            <div class="login-card__error" id="errorMsg"></div>
            <button type="submit" class="login-card__submit" id="submitBtn">Sign In</button>
        </form>

        <a href="index.html" class="login-card__back">← Back to site</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/supabase.js"></script>
<script>
(function() {
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already signed in, go straight to admin
    sb.auth.getSession().then(function(r) {
        if (r.data.session) window.location.href = 'admin/index.html';
    });

    // Google sign-in
    document.getElementById('googleBtn').addEventListener('click', function() {
        var callbackUrl = window.location.origin +
            window.location.pathname.replace('login.html', '') + 'auth/callback.html';
        sb.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: callbackUrl,
                queryParams: { access_type: 'offline', prompt: 'consent' }
            }
        });
    });

    // Email/password sign-in
    document.getElementById('emailForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var errorEl = document.getElementById('errorMsg');
        var btn = document.getElementById('submitBtn');

        errorEl.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        sb.auth.signInWithPassword({ email: email, password: password }).then(function(result) {
            if (result.error) {
                errorEl.textContent = result.error.message || 'Invalid credentials';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            } else {
                window.location.href = 'admin/index.html';
            }
        }).catch(function() {
            errorEl.textContent = 'Something went wrong. Try again.';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });
    });
})();
</script>
</body>
</html>
